<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>المحاسب الذكي - الإصدار v1005</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet">
    <style>
      :root {
        --brand-primary-rgb: 30 64 175;
        --brand-secondary-rgb: 71 85 105;
        --brand-success-rgb: 5 150 105;
        --brand-danger-rgb: 220 38 38;
        --brand-warning-rgb: 217 119 6;
      }

      /* Custom Scrollbar */
      ::-webkit-scrollbar { width: 6px; height: 6px; }
      ::-webkit-scrollbar-track { background: #f1f5f9; }
      .dark ::-webkit-scrollbar-track { background: #1e293b; }
      ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
      .dark ::-webkit-scrollbar-thumb { background: #475569; }
      ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

      /* Sidebar Scrollbar (enhanced) */
      .sidebar-scrollbar {
        scrollbar-width: thin;
        scrollbar-color: #93c5fd #e2e8f0;
      }
      .dark .sidebar-scrollbar {
        scrollbar-color: #60a5fa #1e293b;
      }
      .sidebar-scrollbar::-webkit-scrollbar {
        width: 9px;
      }
      .sidebar-scrollbar::-webkit-scrollbar-track {
        background: linear-gradient(180deg, #f8fafc 0%, #e2e8f0 100%);
        border-radius: 10px;
      }
      .dark .sidebar-scrollbar::-webkit-scrollbar-track {
        background: linear-gradient(180deg, #0f172a 0%, #1e293b 100%);
      }
      .sidebar-scrollbar::-webkit-scrollbar-thumb {
        background: linear-gradient(180deg, #60a5fa 0%, #2563eb 100%);
        border-radius: 10px;
        border: 2px solid transparent;
        background-clip: content-box;
      }
      .sidebar-scrollbar::-webkit-scrollbar-thumb:hover {
        background: linear-gradient(180deg, #3b82f6 0%, #1d4ed8 100%);
        background-clip: content-box;
      }

      /* Print Specific Styles */
      @media print {
        :root { --print-border: rgba(148, 163, 184, 0.45); }
        @page { size: A4; margin: 8mm; }
        body { background-color: white !important; font-size: 11pt; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
        
        /* إخفاء الأزرار والعناصر غير المطلوبة */
        .no-print, .print\\:hidden { display: none !important; }
        button { display: none !important; visibility: hidden !important; }
        [class*="hover:"] { pointer-events: none !important; }
        
        .print-only { display: block !important; }
        .print-break-inside { break-inside: avoid; }
        .shadow-sm, .shadow-lg { box-shadow: none !important; }
        .bg-white { background-color: white !important; }
        
        /* إخفاء أعمدة الأدوات */
        .no-print, th.no-print, td.no-print { display: none !important; }
        
        /* جداول بحدود رمادية (عدا كشف الحساب لأنه يملك حدود مخصصة) */
        table:not(.statement-table) { width: 100% !important; border-collapse: collapse; border: 1px solid var(--print-border) !important; }
        table:not(.statement-table) thead th { 
          background-color: transparent !important; 
          color: #000 !important; 
          font-weight: bold; 
          border: 1px solid var(--print-border) !important;
          padding: 4px 6px !important;
        }
        table:not(.statement-table) tbody td { 
          border: 1px solid var(--print-border) !important;
          padding: 3px 6px !important;
        }
        table:not(.statement-table) tfoot td {
          border: 1px solid var(--print-border) !important;
          font-weight: bold;
          padding: 4px 6px !important;
        }
        
        /* حدود رفيعة للأقسام */
        .print\\:border, .print\\:border-b, .print\\:border-t {
          border-width: 0.5pt !important;
          border-color: var(--print-border) !important;
        }
        .print\\:border-gray-200, .print\\:border-gray-300 {
          border-color: var(--print-border) !important;
        }

        /* كشف الحساب: منع الخروج خارج الصفحة */
        .statement-page > :not([hidden]) ~ :not([hidden]) {
          margin-top: 0 !important;
        }
        .statement-tab-page > :not([hidden]) ~ :not([hidden]) {
          margin-top: 0 !important;
        }
        .statement-page,
        .statement-tab-page,
        .statement-batch-print {
          background: white !important;
          background-color: white !important;
          background-image: none !important;
        }
        .statement-print {
          width: 100% !important;
          max-width: 100% !important;
          overflow: hidden !important;
          background-color: white !important;
          background-image: none !important;
        }
        .statement-batch-item {
          break-after: page !important;
          page-break-after: always !important;
        }
        .statement-batch-item:last-child {
          break-after: auto !important;
          page-break-after: auto !important;
        }
        .statement-print * {
          background: white !important;
          background-color: white !important;
          background-image: none !important;
        }
        .statement-print .statement-table {
          width: 100% !important;
          table-layout: fixed !important;
          border-collapse: collapse !important;
          border: 1px dashed var(--print-border) !important;
        }
        .statement-print [class*="border"] { border-color: var(--print-border) !important; border-style: dashed !important; }
        .statement-print .statement-table th,
        .statement-print .statement-table td {
          text-align: center !important;
          vertical-align: middle !important;
          overflow-wrap: anywhere !important;
          word-break: break-word !important;
          border: 0 !important;
          border-inline-start: 1px dashed var(--print-border) !important;
          border-bottom: 1px dashed var(--print-border) !important;
        }
        .statement-print .statement-table .statement-nowrap {
          white-space: nowrap !important;
          overflow-wrap: normal !important;
          word-break: keep-all !important;
        }
        .statement-print .statement-table tr { border-bottom: 0 !important; }
        .statement-print .statement-table th:first-child,
        .statement-print .statement-table td:first-child { border-inline-start: 0 !important; }
        .statement-print .statement-table tbody tr:last-child td,
        .statement-print .statement-table tfoot tr:last-child td { border-bottom: 0 !important; }
        .statement-print .statement-contact-line {
          display: flex !important;
          flex-wrap: wrap !important;
          min-width: 0 !important;
          white-space: normal !important;
        }
        
        /* Reset Dark Mode for Print */
        .dark body, .dark .bg-slate-900 { background-color: white !important; color: black !important; }
        .dark * { color: black !important; }
      }
    </style>
</head>
  <body class="bg-slate-50 text-slate-900 font-sans antialiased dark:bg-slate-900 dark:text-slate-100 transition-colors duration-300">
    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
